services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: handyman_invoicing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/handyman_invoicing?schema=public
    depends_on:
      - postgres

volumes:
  postgres_data: