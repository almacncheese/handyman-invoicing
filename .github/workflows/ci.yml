name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Build-time only stubs — fail-closed secrets not required for `next build`
          NODE_ENV: production
          AUTH_SECRET: ci-build-secret-not-for-production-use-32b
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
          APP_URL: http://localhost:3000
          PAYMENTS_MODE: mock
          ALLOW_MOCK_PAYMENTS: 'true'
